<!DOCTYPE html>
<html lang="sv">
    <meta name="description" content="specialteckenhanterare">
<head>
<title>Specialteckenhanterare</title>
  <style>
    body {background-color:#ffffff;}
    h2{
        color: #000000;
        font-size: 150%;
        margin: 5px 0 10px 15px;
    }
    h1{
        color: #000000;
    }
    p{
        margin: 5px 0 10px 15px;
    }
    li{
        margin: 5px 0 10px 15px;
    }

button {
margin: 5px 0 10px 15px;
position: relative;
cursor: pointer;
}

.tooltip {
  position: relative;
  display: inline-block;
  border-bottom: 1px dotted black;
}

.tooltiptext {
  visibility: hidden;
  background-color: #555;
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px 0;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 150%;
  width: max-content;
  padding: 5px;
  margin-left: -30px;
  opacity: 0;
  transition: opacity 0.3s;
}

 button:hover .tooltiptext {
        visibility: visible;
        opacity: 1;
        
}


  </style>
</head>
<body>
    <h1>Specialteckenhanterare</h1>
    <p>Tryck på en knapp för att kopiera specialtecknet och få det i fältet nedan</p>
    <input type="text" id="textfält" placeholder="Specialtecken visas här...">
    <button onclick="kopieraText()">Kopiera text</button>
    <p id="clipboard"></p>

<p>Opperationer</p>   
<div class="tooltip"> 
<button onclick="specialTecken('×')">×<span class="tooltiptext">Multiplikationstecken</span></button> 
<button onclick="specialTecken('÷')">÷<span class="tooltiptext">Divitionstecken</span></button>

<button onclick="specialTecken('√')">√<span class="tooltiptext">Rottecknet</span></button>
<button onclick="specialTecken('∛')">∛<span class="tooltiptext">Kubikrot</span></button>
<button onclick="specialTecken('±')">±<span class="tooltiptext">Plus–minustecken</span></button>
<button onclick="specialTecken('∫')">∫<span class="tooltiptext">Integraltecken</span></button>
</div>

<br> <p>Jämföresesymboler</p>
<div class="tooltip"> 
<button onclick="specialTecken('≥')">≥<span class="tooltiptext">Större än eller lika med</span></button>
<button onclick="specialTecken('≤')">≤<span class="tooltiptext">Mindre än eller lika med</span></button>
<button onclick="specialTecken('≠')">≠<span class="tooltiptext">Inte lika med</span></button>
<button onclick="specialTecken('≈')">≈<span class="tooltiptext">Ungefär lika med</span></button>
<button onclick="specialTecken('≡')">≡<span class="tooltiptext">Identiskt lika med</span></button>
</div>

<br><p>Upphöjda tecken</p>
<div class="tooltip"> 

<button onclick="specialTecken('⁰')">⁰<span class="tooltiptext">Exponent 0</span></button>
<button onclick="specialTecken('¹')">¹<span class="tooltiptext">Exponent 1</span></button>
<button onclick="specialTecken('²')">²<span class="tooltiptext">Exponent 2</span></button>
<button onclick="specialTecken('³')">³<span class="tooltiptext">Exponent 3</span></button>
<button onclick="specialTecken('⁴')">⁴<span class="tooltiptext">Exponent 4</span></button>
<button onclick="specialTecken('⁵')">⁵<span class="tooltiptext">Exponent 5</span></button>
<button onclick="specialTecken('⁶')">⁶<span class="tooltiptext">Exponent 6</span></button>
<button onclick="specialTecken('⁷')">⁷<span class="tooltiptext">Exponent 7</span></button>
<button onclick="specialTecken('⁸')">⁸<span class="tooltiptext">Exponent 8</span></button>
<button onclick="specialTecken('⁹')">⁹<span class="tooltiptext">Exponent 9</span></button>
<button onclick="specialTecken('¹⁰')">¹⁰<span class="tooltiptext">Exponent 10</span></button>
<button onclick="specialTecken('ⁿ')">ⁿ<span class="tooltiptext">Exponent</span></button>
<button onclick="specialTecken('ᐟ')">ᐟ<span class="tooltiptext">Upphöjt snedtecken</span></button>
</div>

<br><p>Nersänkta tecken</p>
<div class="tooltip"> 
<button onclick="specialTecken('₀')">₀<span class="tooltiptext">Nedsänkt 0</span></button>
<button onclick="specialTecken('₁')">₁<span class="tooltiptext">Nedsänkt 1</span></button>
<button onclick="specialTecken('₂')">₂<span class="tooltiptext">Nedsänkt 2</span></button>
<button onclick="specialTecken('₃')">₃<span class="tooltiptext">Nedsänkt 3</span></button>
<button onclick="specialTecken('₄')">₄<span class="tooltiptext">Nedsänkt 4</span></button>
<button onclick="specialTecken('₅')">₅<span class="tooltiptext">Nedsänkt 5</span></button>
<button onclick="specialTecken('₆')">₆<span class="tooltiptext">Nedsänkt 6</span></button>
<button onclick="specialTecken('₇')">₇<span class="tooltiptext">Nedsänkt 7</span></button>
<button onclick="specialTecken('₈')">₈<span class="tooltiptext">Nedsänkt 8</span></button>
<button onclick="specialTecken('₉')">₉<span class="tooltiptext">Nedsänkt 9</span></button>
<button onclick="specialTecken('₁₀')">₁₀<span class="tooltiptext">Nedsänkt 10</span></button>
<button onclick="specialTecken('ₙ')">ₙ<span class="tooltiptext">Nedsänkt<span></button>
<button onclick="specialTecken('⸝')">⸝<span class="tooltiptext">Nedsänkt snedtecken</span></button>
</div>

<br><p>Symboler</p>
<div class="tooltip"> 
<button onclick="specialTecken('°')">°<span class="tooltiptext">Gradtecken</span></button>
<button onclick="specialTecken('⁺')">⁺<span class="tooltiptext">Upphöjt plustecken</span></button>
<button onclick="specialTecken('⁻')">⁻<span class="tooltiptext">Upphöjt minustecken</span></button>
</div>



<script>
function specialTecken(tecken){
    var input = document.getElementById("textfält");
    input.value += tecken;
    navigator.clipboard.writeText(tecken).then(function() {
        document.getElementById("clipboard").innerText = tecken + " finns nu i clipboard";
    });
}

function kopieraText(){
    var input = document.getElementById("textfält");
    navigator.clipboard.writeText(input.value).then(function() {
        document.getElementById("clipboard").innerText =  input.value + " finns nu i clipboard";
    });
}
</script>
</body>
</html>
